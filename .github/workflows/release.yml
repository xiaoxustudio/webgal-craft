name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    outputs:
      changelog: ${{ steps.release-drafter.outputs.body }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate release changelog
        id: release-drafter
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ github.token }}

  release:
    name: ${{ matrix.platform }}
    needs: changelog
    environment: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            releaseLabel: linux-64-bit
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            platform: macos-x64
            releaseLabel: macos-intel
            target: x86_64-apple-darwin
          - os: macos-latest
            platform: macos-arm64
            releaseLabel: macos-apple-silicon
            target: aarch64-apple-darwin
          - os: windows-latest
            platform: windows-x64
            releaseLabel: windows-64-bit
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install

      - name: Build and create release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: WebGAL Craft v__VERSION__
          releaseBody: ${{ needs.changelog.outputs.changelog }}
          releaseDraft: true
          assetNamePattern: "[name]-v[version]-${{ matrix.releaseLabel }}[setup][ext]"
          args: -t ${{ matrix.target }}
