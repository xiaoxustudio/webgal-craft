name: Lint

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "bun.lock"
      - "eslint.config.js"
      - "stylelint.config.js"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - "bun.lock"
      - "eslint.config.js"
      - "stylelint.config.js"
      - ".github/workflows/lint.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  lint:
    permissions:
      contents: read
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: js
            command: bun lint:js
          - name: style
            command: bun lint:style
          - name: i18n
            command: bun lint:i18n
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install

      - name: Run lint checks
        run: ${{ matrix.command }}
