name: Typecheck

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "bun.lock"
      - "vite.config.ts"
      - "unocss.config.ts"
      - "eslint.config.js"
      - "stylelint.config.js"
      - "tsconfig*.json"
      - ".github/workflows/typecheck.yml"
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - "bun.lock"
      - "vite.config.ts"
      - "unocss.config.ts"
      - "eslint.config.js"
      - "stylelint.config.js"
      - "tsconfig*.json"
      - ".github/workflows/typecheck.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install

      - name: Run frontend typecheck
        run: bun typecheck
