name: Code Suggestions

on:
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - "bun.lock"
      - "eslint.config.js"
      - "stylelint.config.js"
      - ".github/workflows/code-suggestions.yml"
      - ".github/workflows/lint.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  code-suggestions:
    permissions:
      contents: read
      checks: write
      pull-requests: write
    name: suggest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install

      - name: Run ESLint with reviewdog
        id: eslint
        continue-on-error: true
        uses: reviewdog/action-eslint@v1
        with:
          reporter: github-pr-review
          tool_name: eslint
          eslint_flags: "**/*.{js,jsx,ts,tsx,cjs,mjs,vue}"

      - name: Run ESLint i18n with reviewdog
        id: i18n
        continue-on-error: true
        uses: reviewdog/action-eslint@v1
        with:
          reporter: github-pr-review
          tool_name: i18n
          eslint_flags: "src/locales/*.{json,json5,yaml,yml}"

      - name: Run Stylelint with reviewdog
        id: stylelint
        continue-on-error: true
        uses: reviewdog/action-stylelint@v1
        with:
          reporter: github-pr-review
          stylelint_input: "src/**/*.{css,vue}"

      - name: Fail if any suggestion check failed
        if: ${{ steps.eslint.outcome == 'failure' || steps.i18n.outcome == 'failure' || steps.stylelint.outcome == 'failure' }}
        run: exit 1
